name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.6"
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Verify lockfile and requirements are in sync
        run: |
          uv lock --check
          uv export --format requirements-txt --no-hashes --no-annotate --no-header --no-dev --no-emit-project -o requirements.txt
          git diff --exit-code requirements.txt

      - name: Lint
        run: |
          uv run ruff format --check digit_recog streamlit_app tests train.py
          uv run ruff check digit_recog streamlit_app tests train.py

      - name: Type check
        run: uv run ty check digit_recog streamlit_app tests train.py

      - name: Test
        run: uv run pytest -q
