version: 2
updates:
  # Python dependencies are not auto-updated: the core stack is pinned to the
  # trained model (see "Dependencies" in the README), and the deployed
  # requirements.txt is exported from uv.lock, which Dependabot cannot
  # regenerate. They are updated manually with `uv lock --upgrade`. GitHub's
  # security alerts still cover every dependency.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
